    <!-- Public IP/HTTP cannot install as a PWA — bounce to trusted HTTPS immediately. -->
    <script>
      (function () {
        var host = location.hostname
        var needsCanonical =
          host === '52.66.237.235' ||
          (host === '52.66.237.235.sslip.io' && location.protocol === 'http:')
        if (needsCanonical) {
          location.replace(
            'https://52.66.237.235.sslip.io' +
              location.pathname +
              location.search +
              location.hash,
          )
        }
      })()
    </script>
