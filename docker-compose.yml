# Local full stack: UI (this repo) + API (../BachatKhata) + Postgres
# Expects sibling checkout: C-Vault/BachatKhata and C-Vault/BachatKhata-UI
#
#   cp .env.docker.example .env.docker   # set GEMINI_API_KEY
#   docker compose --env-file .env.docker up --build
#
# UI (HTTP)              → http://localhost:8080
# UI (trusted HTTPS)     → https://52.66.237.235.sslip.io  (needs SG ports 80+443)
# API                    → http://localhost:3000
# Docs                   → http://localhost:3000/api/docs

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bachatkhata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Keep Postgres on the compose network only — do not publish 5432 on cloud hosts.
    # For local DB tools: temporarily add `ports: ["5432:5432"]`.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bachatkhata"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../BachatKhata
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - path: .env.docker
        required: false
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Overrides any host DATABASE_URL so the API always reaches the compose db service
      DATABASE_URL: postgresql://postgres:postgres@db:5432/bachatkhata?schema=public
      SWAGGER_PATH: api/docs
    depends_on:
      db:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Empty = same-origin (nginx proxies API). Required when UI is behind HTTPS.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        # Must match backend VAPID_PUBLIC_KEY (baked at build time).
        VITE_VAPID_PUBLIC_KEY: ${VITE_VAPID_PUBLIC_KEY:-}
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

  # Trusted HTTPS via Let's Encrypt — required for Android Chrome PWA install.
  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - ui

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
