# HTTP serves the SPA (Caddy terminates public HTTPS in front).
# Also used for local `docker compose` on :8080.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Nest API on the compose network — browser calls same origin when behind Caddy HTTPS.
    location ~ ^/(benefits|search|recommendation|ai|api)(/|$) {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache";
        add_header Service-Worker-Allowed "/";
        try_files $uri =404;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        default_type application/manifest+json;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/manifest+json image/svg+xml;
}
